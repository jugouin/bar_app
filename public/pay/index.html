<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CVE — Paiement</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f7fb;
      font-family: Georgia, serif;
      text-align: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 4px 24px rgba(45,84,120,0.10);
      max-width: 320px;
      width: 100%;
    }
    .logo { font-size: 40px; margin-bottom: 16px; }
    h1 { color: #2D5478; font-size: 20px; margin: 0 0 8px; }
    p  { color: #4a6a82; font-size: 14px; margin: 0 0 24px; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: #2D5478;
      color: white;
      padding: 14px 32px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 15px;
      font-weight: bold;
    }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: #8aacbf;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚓</div>
    <h1>Régler ma facture</h1>
    <p>Cliquez sur le bouton ci-dessous pour ouvrir l'application CVE et procéder au paiement.</p>
    <a id="pay-btn" href="#" class="btn">Ouvrir l'application →</a>
    <p class="hint">Si l'application ne s'ouvre pas, assurez-vous qu'elle est bien installée.</p>
  </div>

  <script>
    // Récupérer l'invoiceId depuis l'URL
    const params    = new URLSearchParams(window.location.search);
    const invoiceId = params.get('invoiceId');

    if (invoiceId) {
      // Construire le deep link cve://pay?invoiceId=xxx
      const deepLink = `cve://pay?invoiceId=${invoiceId}`;
      document.getElementById('pay-btn').href = deepLink;

      // Tenter l'ouverture automatique après 500ms
      // (laisser la page se rendre d'abord)
      setTimeout(() => {
        window.location.href = deepLink;
      }, 500);
    } else {
      document.getElementById('pay-btn').style.display = 'none';
      document.querySelector('p').textContent = 'Lien invalide.';
    }
  </script>
</body>
</html>
